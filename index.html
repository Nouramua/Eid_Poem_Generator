<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عيدك بـ بيتين ✨T1</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @import "https://unpkg.com/open-props";
        @import "https://unpkg.com/open-props/normalize.min.css";

        :root { 
            --env-w: 280px; 
            --env-h: 180px; 
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(-45deg, #ffcfd2, #f1c0e8, #a3c4f3, #b9fbc0, #fbf8cc);
            background-size: 400% 400%;
            animation: pastelCandyGradient 15s ease infinite;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Tajawal', sans-serif; overflow-x: hidden;
        }

        @keyframes pastelCandyGradient {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }

        .main-container {
            width: 100%; max-width: 800px; display: flex; flex-direction: column; 
            align-items: center; text-align: center; padding: 20px; min-height: 100vh;
        }

        /* بوكس الإدخال مع الشادو الخيالي */
        .input-section { 
            width: 90%; max-width: 400px; margin-top: 20px; margin-bottom: 20px; 
            z-index: 100; position: relative; transition: opacity 0.3s;
        }
        .name-input {
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid white;
            background: white; font-size: 1.1rem; text-align: center; outline: none;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* الكاروسيل */
        .scrollport {
            -webkit-mask-image: linear-gradient(to right, #0000, #000 20%, #000 80%, #0000);
            width: 100vw; display: flex; gap: 60px; overflow-x: auto;
            scroll-snap-type: x mandatory; 
            padding-block: 150px 80px; /* مساحة أكبر للبطاقة */
            scrollbar-width: none; direction: ltr;
        }
        
        /* ضبط التوسيط للابتوب والجوال */
        .scrollport { padding-inline: calc(50vw - (var(--env-w) / 2) - 30px); }

        .scrollport::-webkit-scrollbar { display: none; }

        .env-wrapper {
            flex: 0 0 var(--env-w); height: var(--env-h);
            position: relative; scroll-snap-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.3; transform: scale(0.85); direction: rtl;
        }

        .env-wrapper.is-active { opacity: 1; transform: scale(1.15); z-index: 150; }

        .envelope-container {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .env-base { position: absolute; width: 100%; height: 100%; background-size: cover; border-radius: 0 0 15px 15px; z-index: 10; box-shadow: var(--shadow-5); }
        
        .env-flap {
            position: absolute; top: -84px; left: 0; width: 100%; height: 85px;
            background: inherit; background-position: top;
            clip-path: polygon(0 100%, 50% 0, 100% 100%);
            z-index: 25; transform-origin: bottom; transition: 0.6s ease;
        }

        .env-front {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: inherit; background-position: bottom;
            clip-path: polygon(0 40%, 50% 75%, 100% 40%, 100% 100%, 0 100%);
            z-index: 30; border-radius: 0 0 15px 15px;
        }

        /* البطاقة - الحجم المطور */
        .card-body {
            position: absolute; bottom: 10px; left: 4%; width: 92%; height: 320px; /* طول إضافي */
            background: #fff; border-radius: 12px; z-index: 5;
            transform: translateY(0); transition: 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 25px; box-sizing: border-box; display: flex; flex-direction: column;
            justify-content: center; box-shadow: var(--shadow-4);
            opacity: 0; visibility: hidden;
        }

        /* الأنيميشن: الظرف ينزل والبطاقة تطلع لمساحة رؤية كاملة */
        .env-wrapper.open .envelope-container { transform: translateY(120px); } 
        .env-wrapper.open .env-flap { transform: rotateX(180deg); z-index: 2; }
        .env-wrapper.open .card-body { transform: translateY(-240px); opacity: 1; visibility: visible; }
        
        /* إخفاء بوكس الاسم مؤقتاً عند الفتح في الجوال لزيادة المساحة */
        body.has-open-card .input-section { opacity: 0.1; pointer-events: none; }

        .action-area { margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; padding-bottom: 20px; z-index: 200; }
        .btn-main {
            width: 85%; max-width: 350px; padding: 18px; border-radius: 50px; border: none; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; color: white; box-shadow: var(--shadow-3);
        }

        footer { font-weight: bold; color: #888; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body id="bodyTag">

    <div class="main-container">
        <div class="header" style="margin-bottom: 0;"><h1>عيدك بـ بيتين ✨</h1></div>

        <div class="input-section" id="inputBox">
            <input type="text" id="nameIn" class="name-input" placeholder="اكتب اسم الشخص هنا..." oninput="updateName()">
        </div>

        <div class="scrollport" id="scrollport">
            </div>

        <div class="action-area">
            <button class="btn-main" style="background-color: #ff4d6d;" onclick="toggleOpen()">فتح / إغلاق الظرف ✉️</button>
            <button class="btn-main" style="background-color: #25D366;" onclick="sendWhatsApp()">إرسال عبر الواتساب 🟢</button>
            <footer>صنع بحب لمى & نورة ♡</footer>
        </div>
    </div>

    <script>
        const scrollport = document.getElementById('scrollport');
        const bodyTag = document.getElementById('bodyTag');
        const totalItems = 6;
        let activeWrapper = null;

        function initApp() {
            let html = '';
            for (let i = 0; i < 3; i++) {
                for (let j = 1; j <= totalItems; j++) {
                    const img = `Media/${j}.png`;
                    html += `
                        <div class="env-wrapper">
                            <div class="envelope-container">
                                <div class="env-base" style="background-image: url(${img})">
                                    <div class="env-flap" style="background-image: url(${img})"></div>
                                    <div class="card-body">
                                        <div class="greet-text" style="font-weight:900; font-size:1.3rem; color:#333;">يا [الاسم].. 👋</div>
                                        <div class="poem-text" style="color:#d63384; font-size:1.15rem; margin-top:20px; line-height:1.8; font-weight:500;">
                                            يا عسى عيدك مبارك وأيامك سعيد،<br>
                                            والفرح في دنيتك كل لحظة يزيد!<br>
                                            عساك من عواده. 🌸
                                        </div>
                                    </div>
                                    <div class="env-front" style="background-image: url(${img})"></div>
                                </div>
                            </div>
                        </div>`;
                }
            }
            scrollport.innerHTML = html;
            setTimeout(() => {
                scrollport.scrollLeft = (scrollport.scrollWidth / 3);
                updateActiveState();
            }, 200);
        }

        // دالة تحديد الظرف الأقرب للمركز (دقيقة جداً للابتوب والجوال)
        function updateActiveState() {
            const centerX = scrollport.scrollLeft + (scrollport.offsetWidth / 2);
            let closest = null;
            let minDistance = Infinity;

            document.querySelectorAll('.env-wrapper').forEach(el => {
                const elCenter = el.offsetLeft + (el.offsetWidth / 2);
                const distance = Math.abs(centerX - elCenter);
                if (distance < minDistance) {
                    minDistance = distance;
                    closest = el;
                }
            });

            document.querySelectorAll('.env-wrapper').forEach(el => {
                el.classList.remove('is-active');
                if (el !== closest) el.classList.remove('open');
            });

            if (closest) {
                closest.classList.add('is-active');
                activeWrapper = closest;
            }
            
            // تحديث حالة الجسم لإخفاء المدخلات عند الحاجة
            if (!activeWrapper.classList.contains('open')) {
                bodyTag.classList.remove('has-open-card');
            }
        }

        scrollport.addEventListener('scroll', () => {
            updateActiveState();
            // السكرول اللانهائي
            const x = scrollport.scrollLeft;
            const w = scrollport.scrollWidth;
            if (x <= 10) scrollport.scrollLeft = w / 3;
            if (x >= (w * 2/3)) scrollport.scrollLeft = w / 3;
        });

        function toggleOpen() {
            if (activeWrapper) {
                activeWrapper.classList.toggle('open');
                bodyTag.classList.toggle('has-open-card', activeWrapper.classList.contains('open'));
            }
        }

        function updateName() {
            const name = document.getElementById('nameIn').value || "[الاسم]";
            document.querySelectorAll('.greet-text').forEach(el => el.innerText = `يا ${name}.. 👋`);
        }

        function sendWhatsApp() {
            const name = document.getElementById('nameIn').value || "صديقي";
            window.open(`https://wa.me/?text=${encodeURIComponent('يا ' + name + '.. عساك من عواده! ✨')}`);
        }

        initApp();
    </script>
</body>
</html>
